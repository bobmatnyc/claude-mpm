name: Release Platform Wheels

# Builds platform-specific wheels with the bundled ztk binary embedded under
# src/claude_mpm/bin/ztk, then publishes to PyPI. Each wheel carries the
# correct platform tag so pip selects the right one for the user's OS/arch.
#
# Triggers:
#   - Push of tags matching v* (release tags)
#   - Manual dispatch (for testing without bumping a tag)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ztk_tag:
        description: 'ztk release tag to bundle (e.g. v0.3.1)'
        required: true
        default: 'v0.3.1'

permissions:
  contents: read

jobs:
  build:
    name: Build wheel (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macosx_11_0_arm64
          - macosx_10_9_x86_64
          - linux_x86_64
          - linux_aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel twine

      - name: Resolve ztk tag
        id: ztk
        run: |
          # Prefer workflow_dispatch input; otherwise read pinned version from Makefile
          if [ -n "${{ github.event.inputs.ztk_tag }}" ]; then
            echo "tag=${{ github.event.inputs.ztk_tag }}" >> "$GITHUB_OUTPUT"
          else
            tag="$(grep -E '^ZTK_VERSION \?=' Makefile | head -n1 | awk -F'= ' '{print $2}' | tr -d '[:space:]')"
            if [ -z "$tag" ]; then
              echo "Could not determine ZTK_VERSION from Makefile" >&2
              exit 1
            fi
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

      - name: Download bundled ztk binary
        run: |
          set -euo pipefail
          mkdir -p src/claude_mpm/bin
          tag='${{ steps.ztk.outputs.tag }}'
          repo='codejunkie99/ztk'
          # Map the wheel platform tag -> codejunkie99/ztk release tarball asset.
          # Upstream ships .tar.gz tarballs, not bare binaries.
          case '${{ matrix.platform }}' in
            macosx_11_0_arm64)  asset='ztk-aarch64-macos.tar.gz' ;;
            macosx_10_9_x86_64) asset='ztk-x86_64-macos.tar.gz' ;;
            linux_x86_64)       asset='ztk-x86_64-linux-musl.tar.gz' ;;
            linux_aarch64)      asset='ztk-aarch64-linux-musl.tar.gz' ;;
            *) echo "Unknown platform '${{ matrix.platform }}'" >&2; exit 1 ;;
          esac
          url="https://github.com/${repo}/releases/download/${tag}/${asset}"
          echo "Downloading ${url}"
          tmp="$(mktemp -d)"
          if curl -fSL --retry 3 -o "${tmp}/${asset}" "$url" 2>/dev/null \
             && tar -xzf "${tmp}/${asset}" -C "${tmp}"; then
            bin="$(find "${tmp}" -type f -name ztk | head -n1)"
            if [ -n "${bin}" ]; then
              mv -f "${bin}" src/claude_mpm/bin/ztk
              chmod +x src/claude_mpm/bin/ztk
              echo "ztk binary extracted successfully"
            else
              echo "WARNING: no ztk binary inside ${asset} — building wheel without bundled ztk"
            fi
          else
            echo "WARNING: ztk asset not available at ${url} — building wheel without bundled ztk"
          fi
          rm -rf "${tmp}"
          # LICENSE: try release asset, then raw repo, else placeholder
          if ! curl -fSL --retry 3 -o src/claude_mpm/bin/ztk_LICENSE \
               "https://github.com/${repo}/releases/download/${tag}/LICENSE" 2>/dev/null; then
            curl -fSL --retry 3 -o src/claude_mpm/bin/ztk_LICENSE \
              "https://raw.githubusercontent.com/${repo}/master/LICENSE" 2>/dev/null \
              || echo "ztk binary from https://github.com/${repo} (${tag})" \
                   > src/claude_mpm/bin/ztk_LICENSE
          fi
          ls -la src/claude_mpm/bin/

      - name: Verify bundled ztk binary is present
        run: |
          set -euo pipefail
          # A successful leg MUST ship its platform binary. The download step is
          # non-fatal (#594) so a missing upstream asset won't hard-fail the
          # matrix, but if the binary is here we confirm it landed before the
          # wheel is built/retagged with this leg's platform tag.
          if [ -f src/claude_mpm/bin/ztk ]; then
            echo "ztk binary bundled for ${{ matrix.platform }}:"
            ls -la src/claude_mpm/bin/ztk
          else
            echo "WARNING: no ztk binary for ${{ matrix.platform }} — wheel will ship without bundled ztk"
          fi

      - name: Build wheel
        run: python -m build --wheel

      - name: Retag wheel with platform
        run: |
          set -euo pipefail
          # Source build produces py3-none-any.whl; retag to platform-specific so
          # pip selects the wheel carrying the correct per-platform ztk binary.
          orig=$(ls dist/*.whl | head -n1)
          echo "Original wheel: $orig"
          python -m wheel tags --platform-tag '${{ matrix.platform }}' --remove "$orig"
          ls -la dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl
          if-no-files-found: error

  # Build the sdist exactly once (separate from the wheel matrix) so a single
  # source tarball is published — avoids duplicate-filename 400s on PyPI.
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    # Only publish on tag pushes, not manual dispatches
    if: startsWith(github.ref, 'refs/tags/v')
    # OIDC: the id-token permission lets the PyPA action mint a short-lived
    # token via PyPI Trusted Publishing — no PYPI_API_TOKEN secret required.
    permissions:
      id-token: write
      contents: read
    # The environment name MUST match the PyPI trusted-publisher config
    # (PyPI → claude-mpm → Publishing → environment = "pypi").
    environment:
      name: pypi
      url: https://pypi.org/p/claude-mpm
    steps:
      - name: Download all wheels and sdist
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List distributions
        run: ls -la dist/

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # skip-existing keeps a re-run (or an already-present file) from
          # failing the whole release with a 400/403.
          skip-existing: true
